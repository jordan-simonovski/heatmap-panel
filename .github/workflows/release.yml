name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_mode:
        description: 'Release mode'
        required: true
        default: 'publish-now'
        type: choice
        options:
          - publish-now
          - version-only

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history is required so changeset can diff against the base branch
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}" ]]; then
            echo "Warning: GRAFANA_ACCESS_POLICY_TOKEN secret is not set." \
              "Plugin signing will fail if a publish is triggered." >&2
          fi

      - name: Publish plugin artifacts now
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'publish-now' }}
        run: npm run publish-plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Version PR (Changesets only)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_mode == 'version-only' }}
        id: changesets
        uses: changesets/action@v1
        with:
          # When pending changesets exist: bump versions and update changelogs.
          version: npm run version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
